<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | BrainBridge</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-black text-white min-h-screen flex items-center justify-center p-6"
  >
    <div class="bg-gray-900 p-10 rounded-3xl w-full max-w-md">
      <h1 class="text-5xl font-bold text-center mb-10 text-blue-500">
        BrainBridge
      </h1>

      <input
        id="username"
        type="text"
        placeholder="Enter username"
        class="w-full p-4 rounded-xl text-black mb-5"
      />

      <input
        id="password"
        type="password"
        placeholder="Enter password"
        class="w-full p-4 rounded-xl text-black mb-8"
      />

      <button
        id="signupBtn"
        class="w-full bg-blue-500 hover:bg-blue-600 p-4 rounded-xl font-semibold mb-4"
      >
        Sign Up
      </button>

      <button
        id="loginBtn"
        class="w-full bg-green-500 hover:bg-green-600 p-4 rounded-xl font-semibold"
      >
        Login
      </button>

      <p id="message" class="text-center mt-6 text-gray-400"></p>
    </div>

    <script>
      const username = document.getElementById("username");

      const password = document.getElementById("password");

      const signupBtn = document.getElementById("signupBtn");

      const loginBtn = document.getElementById("loginBtn");

      const message = document.getElementById("message");

      // SIGNUP

      signupBtn.addEventListener("click", () => {
        localStorage.setItem("bb_username", username.value);

        localStorage.setItem("bb_password", password.value);

        message.innerText = "Account Created Successfully!";
      });

      // LOGIN

      loginBtn.addEventListener("click", () => {
        const savedUser = localStorage.getItem("bb_username");

        const savedPass = localStorage.getItem("bb_password");

        if (username.value === savedUser && password.value === savedPass) {
          localStorage.setItem("bb_loggedIn", "true");

          window.location.href = "index.html";
        } else {
          message.innerText = "Invalid Credentials";
        }
      });
    </script>
  </body>
</html>
